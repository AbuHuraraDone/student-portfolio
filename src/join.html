<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join a Club - University Clubs Portal</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>University Clubs Portal</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="clubs.html">Clubs</a>
      <a href="events.html">Events</a>
      <a href="join.html">Join</a>
      <a href="highlights.html">Highlights</a>
    </nav>
  </header>

  <!-- Join Section -->
  <section class="about">
    <h2>Join a Student Club</h2>
    <p>Fill out the form below to become a member of your favorite club.</p>
  </section>

  <!-- Form Section -->
  <section class="join-form">
    <form>

      <label>Full Name</label>
      <input type="text" placeholder="Enter your name" required>

      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>

      <label>Department</label>
      <input type="text" placeholder="e.g. Software Engineering" required>

      <label>Select Club</label>
      <select required>
        <option value="">-- Choose Club --</option>
        <option>Technology Club</option>
        <option>Sports Club</option>
        <option>Cultural Club</option>
        <option>Debate Society</option>
      </select>

      <label>Why do you want to join?</label>
      <textarea rows="4" placeholder="Write your reason..." required></textarea>

      <button type="submit">Submit</button>

    </form>
  </section>

  <!-- Call To Action -->
  <section class="cta">
    <h2>Explore More Clubs</h2>
    <p>Discover all available clubs and activities.</p>
    <a href="clubs.html" class="btn">View Clubs</a>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 University Clubs Portal | All Rights Reserved</p>
  </footer>

</body>
</html>
